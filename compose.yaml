services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: change_radar
      POSTGRES_USER: change_radar
      POSTGRES_PASSWORD: change_radar_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U change_radar -d change_radar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://change_radar:change_radar_dev@db:5432/change_radar
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      AUTO_CREATE_TABLES: false
      SEED_DEMO_DATA: true
      INTERNAL_USER_KEY: internal-demo
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
